name: Build & Release APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 1b. Deploy Supabase Edge Functions ────────────────────────────────
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.22.6

      - name: Deploy nightly-renewal function
        run: supabase functions deploy nightly-renewal --project-ref pqjnkazkkagmewbaylti
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy geo-check function
        run: supabase functions deploy geo-check --project-ref pqjnkazkkagmewbaylti
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── 2. Java setup ──────────────────────────────────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── 3. Node setup ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 4. Install JS deps ─────────────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 5. Write env secrets ───────────────────────────────────────────────
      - name: Write .env
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          echo "VITE_TMDB_API_KEY=${{ secrets.VITE_TMDB_API_KEY }}" >> .env

      # ── 6. Install Android SDK ─────────────────────────────────────────────
      - name: Install Android SDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;35.0.0" 2>/dev/null || \
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;34.0.0"

      # ── 7. Build web bundle for Capacitor ─────────────────────────────────
      - name: Build Android web bundle
        run: npm run build:app

      # ── 8. Read version from version.json ──────────────────────────────────
      - name: Read app version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./version.json').versionName)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      # ── 9. Patch CURRENT_VERSION in UpdateChecker ─────────────────────────
      - name: Patch UpdateChecker current version
        run: |
          VERSION=$(node -e "console.log(require('./version.json').versionName)")
          sed -i "s/const CURRENT_VERSION = \"[^\"]*\"/const CURRENT_VERSION = \"$VERSION\"/" \
            src/components/UpdateChecker.tsx

      # ── 10. Copy web assets and cap sync ──────────────────────────────────
      - name: Capacitor sync
        run: |
          mkdir -p android/app/src/main/assets/public
          rm -rf android/app/src/main/assets/public/*
          cp -r dist/. android/app/src/main/assets/public/
          npx cap sync android

      # ── 11. Fix gradle.properties for CI ──────────────────────────────────
      - name: Fix gradle.properties for CI
        run: sed -i '/org.gradle.java.home/d' android/gradle.properties

      # ── 12. Decode keystore ───────────────────────────────────────────────
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/ttflix.jks

      # ── 13. Make gradlew executable ───────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 14. Build release APK ─────────────────────────────────────────────
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 15. Rename APK ────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "Found APK: $APK"
          mv "$APK" android/app/build/outputs/apk/release/ttflix.apk

      # ── 16. Build download page ───────────────────────────────────────────
      - name: Build download page
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          APK_URL="https://github.com/murrentronics/ttflix/releases/download/v${VERSION}/ttflix.apk"
          mkdir -p download-page/functions

          # version.json — fetched by the app on launch to check for updates
          cat > download-page/version.json << EOF
          {
            "versionName": "${VERSION}",
            "versionCode": $(grep 'versionCode' android/app/build.gradle | grep -o '[0-9]*'),
            "releaseNotes": "Bug fixes and improvements",
            "apkUrl": "${APK_URL}"
          }
          EOF

          # Cloudflare Pages Function — geo-blocks non-TT visitors at the edge
          cat > download-page/functions/_middleware.js << 'JSEOF'
          export async function onRequest(context) {
            const country = context.request.headers.get("CF-IPCountry") || "";
            if (country !== "TT" && country !== "XX" && country !== "") {
              return new Response(
                `<!DOCTYPE html><html><head><meta charset="utf-8"/>
                <title>Not Available</title>
                <style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;height:100dvh;overflow:hidden;background:#141414;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;text-align:center}.logo{font-size:2.2rem;font-weight:900;margin-bottom:12px}.logo span{color:#e50914}p{color:#888;font-size:.9rem}</style>
                </head><body>
                <div>
                  <div class="logo"><span>TT</span>FLIX</div>
                  <p>TTFlix is only available in Trinidad &amp; Tobago.</p>
                </div>
                </body></html>`,
                { status: 403, headers: { "Content-Type": "text/html;charset=utf-8" } }
              );
            }
            return context.next();
          }
          JSEOF

          # Stamp version + APK URL into the committed template
          sed \
            -e "s|VVERSION_PLACEHOLDER|${VERSION}|g" \
            -e "s|APKURL_PLACEHOLDER|${APK_URL}|g" \
            download-page-template.html > download-page/index.html

      # ── 17. Deploy download page to Cloudflare Pages ──────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy download-page --project-name=ttflix --commit-dirty=true

      # ── 18. Create GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: TTFlix ${{ steps.version.outputs.TAG }}
          body: "TTFlix ${{ steps.version.outputs.TAG }}"
          files: android/app/build/outputs/apk/release/ttflix.apk
          make_latest: true
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
