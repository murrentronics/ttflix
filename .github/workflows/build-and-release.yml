name: Build & Release APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Java setup ──────────────────────────────────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── 3. Node setup ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 4. Install JS deps ─────────────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 5. Write env secrets ───────────────────────────────────────────────
      - name: Write .env
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      # ── 6. Build web bundle for Capacitor ──────────────────────────────────
      - name: Build Android web bundle
        run: npm run build:app

      # ── 7. Read version from .env ───────────────────────────────────────────
      - name: Read app version
        id: version
        run: |
          VERSION=$(grep 'VITE_APP_VERSION' .env | sed 's/VITE_APP_VERSION="\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      # ── 7b. Patch CURRENT_VERSION in UpdateChecker so old builds detect this one
      - name: Patch UpdateChecker current version
        run: |
          VERSION=$(grep 'VITE_APP_VERSION' .env | sed 's/VITE_APP_VERSION="\(.*\)"/\1/')
          sed -i "s/const CURRENT_VERSION = \"[^\"]*\"/const CURRENT_VERSION = \"$VERSION\"/" \
            src/components/UpdateChecker.tsx

      # ── 8. Copy web assets into Android assets folder ──────────────────────
      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          rm -rf android/app/src/main/assets/public/*
          cp -r dist/. android/app/src/main/assets/public/

      # ── 9. Fix gradle.properties for CI ────────────────────────────────────
      - name: Fix gradle.properties for CI
        run: sed -i '/org.gradle.java.home/d' android/gradle.properties

      # ── 10. Decode keystore ─────────────────────────────────────────────────
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/ttflix.jks

      # ── 11. Make gradlew executable ─────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 12. Install Android SDK ─────────────────────────────────────────────
      - name: Install Android SDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;35.0.0" 2>/dev/null || \
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;34.0.0"

      # ── 13. Build release APK ───────────────────────────────────────────────
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 14. Rename APK ──────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "Found APK: $APK"
          mv "$APK" android/app/build/outputs/apk/release/ttflix.apk

      # ── 15. Build download page ─────────────────────────────────────────────
      - name: Build download page
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          APK_URL="https://github.com/murrentronics/ttflix/releases/download/v${VERSION}/ttflix.apk"
          mkdir -p download-page
          # version.json — fetched by the app on launch to check for updates
          cat > download-page/version.json << EOF
          {
            "versionName": "${VERSION}",
            "versionCode": $(grep 'versionCode' android/app/build.gradle | grep -o '[0-9]*'),
            "releaseNotes": "Bug fixes and improvements",
            "apkUrl": "${APK_URL}"
          }
          EOF
          # Download page HTML
          cat > download-page/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8"/>
            <meta name="viewport" content="width=device-width, initial-scale=1"/>
            <title>TTFlix v${VERSION} — Download</title>
            <style>
              *{margin:0;padding:0;box-sizing:border-box}
              body{background:#141414;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
              .card{background:#1f1f1f;border-radius:16px;padding:40px 32px;max-width:420px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.6)}
              .logo{font-size:2.6rem;font-weight:900;letter-spacing:-1px;margin-bottom:8px}
              .logo span{color:#e50914}
              .badge{display:inline-block;background:#e50914;color:#fff;font-size:.75rem;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:28px}
              .btn{display:flex;align-items:center;justify-content:center;gap:10px;background:#e50914;color:#fff;font-size:1.05rem;font-weight:700;padding:16px 24px;border-radius:10px;text-decoration:none;margin-bottom:12px}
              .req{color:#555;font-size:.78rem}
            </style>
          </head>
          <body>
            <div class="card">
              <div class="logo"><span>TT</span>FLIX</div>
              <div class="badge">v${VERSION}</div>
              <a class="btn" href="${APK_URL}">⬇&nbsp; Download TTFlix v${VERSION}</a>
              <p class="req">Android 7.0+ · Enable "Install unknown apps" to install</p>
            </div>
          </body>
          </html>
          HTMLEOF

      # ── 16. Deploy download page to Cloudflare Pages ───────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy download-page --project-name=ttflix --commit-dirty=true

      # ── 17. Create GitHub Release ───────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: TTFlix ${{ steps.version.outputs.TAG }}
          body: "TTFlix ${{ steps.version.outputs.TAG }}"
          files: android/app/build/outputs/apk/release/ttflix.apk
          make_latest: true
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
