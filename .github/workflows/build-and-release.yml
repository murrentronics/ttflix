name: Build & Release APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 1b. Deploy Supabase Edge Functions ────────────────────────────────
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.22.6

      - name: Deploy nightly-renewal function
        run: supabase functions deploy nightly-renewal --project-ref pqjnkazkkagmewbaylti
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy geo-check function
        run: supabase functions deploy geo-check --project-ref pqjnkazkkagmewbaylti
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── 2. Java setup ──────────────────────────────────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── 3. Node setup ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 4. Install JS deps ─────────────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 5. Write env secrets ───────────────────────────────────────────────
      - name: Write .env
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          echo "VITE_TMDB_API_KEY=${{ secrets.VITE_TMDB_API_KEY }}" >> .env

      # ── 7. Install Android SDK ─────────────────────────────────────────────
      - name: Install Android SDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;35.0.0" 2>/dev/null || \
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;34.0.0"

      # ── 8. Build web bundle for Capacitor ─────────────────────────────────
      - name: Build Android web bundle
        run: npm run build:app

      # ── 9. Read version from version.json ──────────────────────────────────
      - name: Read app version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./version.json').versionName)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      # ── 9b. Patch CURRENT_VERSION in UpdateChecker ────────────────────────
      - name: Patch UpdateChecker current version
        run: |
          VERSION=$(node -e "console.log(require('./version.json').versionName)")
          sed -i "s/const CURRENT_VERSION = \"[^\"]*\"/const CURRENT_VERSION = \"$VERSION\"/" \
            src/components/UpdateChecker.tsx

      # ── 8. Copy web assets and run cap sync to generate Cordova plugin files ──
      - name: Capacitor sync
        run: |
          mkdir -p android/app/src/main/assets/public
          rm -rf android/app/src/main/assets/public/*
          cp -r dist/. android/app/src/main/assets/public/
          npx cap sync android

      # ── 11. Fix gradle.properties for CI ────────────────────────────────────
      - name: Fix gradle.properties for CI
        run: sed -i '/org.gradle.java.home/d' android/gradle.properties

      # ── 12. Decode keystore ─────────────────────────────────────────────────
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/ttflix.jks

      # ── 13. Make gradlew executable ─────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 14. Build release APK ───────────────────────────────────────────────
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 14. Rename APK ──────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "Found APK: $APK"
          mv "$APK" android/app/build/outputs/apk/release/ttflix.apk

      # ── 15. Build download page ─────────────────────────────────────────────
      - name: Build download page
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          APK_URL="https://github.com/murrentronics/ttflix/releases/download/v${VERSION}/ttflix.apk"
          mkdir -p download-page/functions

          # version.json — fetched by the app on launch to check for updates
          cat > download-page/version.json << EOF
          {
            "versionName": "${VERSION}",
            "versionCode": $(grep 'versionCode' android/app/build.gradle | grep -o '[0-9]*'),
            "releaseNotes": "Bug fixes and improvements",
            "apkUrl": "${APK_URL}"
          }
          EOF

          # Cloudflare Pages Function — geo-blocks non-TT visitors at the edge
          cat > download-page/functions/_middleware.js << 'JSEOF'
          export async function onRequest(context) {
            const country = context.request.headers.get("CF-IPCountry") || "";
            // Allow TT and unknown (CF-IPCountry = "XX" means Cloudflare couldn't determine)
            if (country !== "TT" && country !== "XX" && country !== "") {
              return new Response(
                `<!DOCTYPE html><html><head><meta charset="utf-8"/>
                <title>Not Available</title>
                <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#141414;color:#fff;font-family:sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}.logo{font-size:2.2rem;font-weight:900;margin-bottom:16px}.logo span{color:#e50914}p{color:#888;font-size:.95rem}</style>
                </head><body>
                <div>
                  <div class="logo"><span>TT</span>FLIX</div>
                  <p>TTFlix is only available in Trinidad &amp; Tobago.</p>
                </div>
                </body></html>`,
                { status: 403, headers: { "Content-Type": "text/html;charset=utf-8" } }
              );
            }
            return context.next();
          }
          JSEOF

          # Download page HTML
          cat > download-page/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8"/>
            <meta name="viewport" content="width=device-width, initial-scale=1"/>
            <title>TTFlix v${VERSION} — Download</title>
            <style>
              *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

              /* ── Full-screen cinema poster background ── */
              body {
                min-height: 100vh;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                color: #fff;
                overflow-x: hidden;
                background: #0a0a0a;
              }

              /* Poster collage — real movie backdrops tiled in a grid via CSS */
              .bg {
                position: fixed;
                inset: 0;
                z-index: 0;
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                grid-template-rows: repeat(3, 1fr);
                gap: 3px;
                transform: scale(1.06) rotate(-1.5deg);
                filter: brightness(0.38) saturate(1.2);
              }
              .bg-tile {
                background-size: cover;
                background-position: center;
              }
              /* TMDB backdrop images — popular movies, no API key needed for direct image URLs */
              .t0  { background-image: url('https://image.tmdb.org/t/p/w500/fm6KqXpkh7triA08gg7t8j5wFIP.jpg'); }
              .t1  { background-image: url('https://image.tmdb.org/t/p/w500/xJHokMbljvjADYdit5fK5VQsXEG.jpg'); }
              .t2  { background-image: url('https://image.tmdb.org/t/p/w500/8rpDcsfLJypbO6vREc0547VKqEv.jpg'); }
              .t3  { background-image: url('https://image.tmdb.org/t/p/w500/pB8BM7pdSp6B6Ih7QZ4DrQ3PmJK.jpg'); }
              .t4  { background-image: url('https://image.tmdb.org/t/p/w500/v9Du2HC3hlknAvGlWhquRbeifa.jpg'); }
              .t5  { background-image: url('https://image.tmdb.org/t/p/w500/d5iIlFn5s0ImszYzBPb8JPIfbXD.jpg'); }
              .t6  { background-image: url('https://image.tmdb.org/t/p/w500/oYuLEt3zVCKq57qu2F8dT7NIa6f.jpg'); }
              .t7  { background-image: url('https://image.tmdb.org/t/p/w500/qNBAXBIQlnOThrVvA6mA2B5ggkl.jpg'); }
              .t8  { background-image: url('https://image.tmdb.org/t/p/w500/arw2vcBveWOVZr6pxd9XTd1TdQa.jpg'); }
              .t9  { background-image: url('https://image.tmdb.org/t/p/w500/rAiYTfKGqDCRIIqo664sY9XZIvQ.jpg'); }
              .t10 { background-image: url('https://image.tmdb.org/t/p/w500/hO7KbdvGOtDdeg0W4Y5nKEHeDDh.jpg'); }
              .t11 { background-image: url('https://image.tmdb.org/t/p/w500/t6HIqrRAclMCA60NsSmeqe9RmNV.jpg'); }
              .t12 { background-image: url('https://image.tmdb.org/t/p/w500/AkJQpZp9WoNdj7pLYSj1L0RcMMN.jpg'); }
              .t13 { background-image: url('https://image.tmdb.org/t/p/w500/9cqNxx0GxF0bAY74WX9LiyMoehO.jpg'); }
              .t14 { background-image: url('https://image.tmdb.org/t/p/w500/kXfqcdQKsToO0OUXHcrrNCHDBzO.jpg'); }

              /* Dark vignette + red tint gradient over the poster grid */
              .bg-overlay {
                position: fixed;
                inset: 0;
                z-index: 1;
                background:
                  radial-gradient(ellipse at 50% 40%, rgba(229,9,20,0.10) 0%, transparent 65%),
                  linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.25) 40%, rgba(0,0,0,0.75) 100%);
              }

              /* Film grain — SVG noise filter */
              .grain {
                position: fixed;
                inset: 0;
                z-index: 2;
                pointer-events: none;
                opacity: 0.045;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
                background-repeat: repeat;
                background-size: 180px 180px;
              }

              /* ── Page layout ── */
              .page {
                position: relative;
                z-index: 10;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 32px 20px;
              }

              /* Top branding bar */
              .top-logo {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 20;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 18px 32px;
                background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
              }
              .top-logo-text {
                font-size: 1.7rem;
                font-weight: 900;
                letter-spacing: -0.5px;
              }
              .top-logo-text span { color: #e50914; }
              .top-tagline {
                font-size: 0.75rem;
                color: rgba(255,255,255,0.45);
                letter-spacing: 0.08em;
                text-transform: uppercase;
              }

              /* ── Download card ── */
              .card {
                background: rgba(15,15,15,0.82);
                backdrop-filter: blur(28px) saturate(1.4);
                -webkit-backdrop-filter: blur(28px) saturate(1.4);
                border: 1px solid rgba(255,255,255,0.08);
                border-radius: 20px;
                padding: 44px 40px 36px;
                max-width: 440px;
                width: 100%;
                text-align: center;
                box-shadow:
                  0 0 0 1px rgba(229,9,20,0.15),
                  0 32px 80px rgba(0,0,0,0.75),
                  0 0 60px rgba(229,9,20,0.08);
              }

              /* Red glow line at top of card */
              .card::before {
                content: '';
                display: block;
                height: 3px;
                background: linear-gradient(90deg, transparent, #e50914 30%, #ff6b6b 50%, #e50914 70%, transparent);
                border-radius: 3px 3px 0 0;
                margin: -44px -40px 36px;
              }

              .logo {
                font-size: 3rem;
                font-weight: 900;
                letter-spacing: -1.5px;
                line-height: 1;
                margin-bottom: 4px;
              }
              .logo span { color: #e50914; }

              .tagline {
                font-size: 0.7rem;
                letter-spacing: 0.25em;
                text-transform: uppercase;
                color: rgba(255,255,255,0.35);
                margin-bottom: 24px;
              }

              /* Divider */
              .divider {
                height: 1px;
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
                margin: 0 -8px 24px;
              }

              .version-badge {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                background: rgba(229,9,20,0.15);
                border: 1px solid rgba(229,9,20,0.3);
                color: #ff6b6b;
                font-size: 0.7rem;
                font-weight: 700;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                padding: 5px 14px;
                border-radius: 20px;
                margin-bottom: 28px;
              }
              .version-badge::before {
                content: '';
                display: inline-block;
                width: 6px;
                height: 6px;
                background: #e50914;
                border-radius: 50%;
                box-shadow: 0 0 6px #e50914;
              }

              /* Download button */
              .btn-download {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                width: 100%;
                background: linear-gradient(135deg, #e50914 0%, #b00710 100%);
                color: #fff;
                font-size: 1rem;
                font-weight: 800;
                letter-spacing: 0.02em;
                padding: 17px 24px;
                border-radius: 12px;
                text-decoration: none;
                margin-bottom: 14px;
                box-shadow: 0 4px 24px rgba(229,9,20,0.45), 0 1px 0 rgba(255,255,255,0.1) inset;
                transition: transform 0.15s ease, box-shadow 0.15s ease;
              }
              .btn-download:hover {
                transform: translateY(-1px);
                box-shadow: 0 8px 32px rgba(229,9,20,0.6);
              }
              .btn-download:active { transform: translateY(0); }

              .btn-icon {
                width: 22px;
                height: 22px;
                background: rgba(255,255,255,0.15);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.8rem;
                flex-shrink: 0;
              }

              /* Requirements row */
              .req-row {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                flex-wrap: wrap;
                margin-bottom: 20px;
              }
              .req-pill {
                background: rgba(255,255,255,0.06);
                border: 1px solid rgba(255,255,255,0.1);
                color: rgba(255,255,255,0.5);
                font-size: 0.68rem;
                padding: 4px 10px;
                border-radius: 20px;
                white-space: nowrap;
              }

              /* Install note */
              .install-note {
                font-size: 0.72rem;
                color: rgba(255,255,255,0.3);
                line-height: 1.5;
              }
              .install-note strong { color: rgba(255,255,255,0.55); }

              /* Bottom bar */
              .bottom-bar {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 20;
                padding: 16px 32px;
                background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
                text-align: center;
                font-size: 0.65rem;
                color: rgba(255,255,255,0.2);
                letter-spacing: 0.05em;
              }
            </style>
          </head>
          <body>

            <!-- Poster grid background -->
            <div class="bg" aria-hidden="true">
              <div class="bg-tile t0"></div>
              <div class="bg-tile t1"></div>
              <div class="bg-tile t2"></div>
              <div class="bg-tile t3"></div>
              <div class="bg-tile t4"></div>
              <div class="bg-tile t5"></div>
              <div class="bg-tile t6"></div>
              <div class="bg-tile t7"></div>
              <div class="bg-tile t8"></div>
              <div class="bg-tile t9"></div>
              <div class="bg-tile t10"></div>
              <div class="bg-tile t11"></div>
              <div class="bg-tile t12"></div>
              <div class="bg-tile t13"></div>
              <div class="bg-tile t14"></div>
            </div>

            <!-- Dark gradient overlay -->
            <div class="bg-overlay" aria-hidden="true"></div>

            <!-- Film grain -->
            <div class="grain" aria-hidden="true"></div>

            <!-- Top logo bar -->
            <header class="top-logo">
              <div class="top-logo-text"><span>TT</span>FLIX</div>
              <div class="top-tagline">Trinidad &amp; Tobago</div>
            </header>

            <!-- Main content -->
            <main class="page">
              <div class="card">
                <div class="logo"><span>TT</span>FLIX</div>
                <div class="tagline">Stream Everything</div>

                <div class="divider"></div>

                <div class="version-badge">Version ${VERSION}</div>

                <a class="btn-download" href="${APK_URL}" download>
                  <span class="btn-icon">↓</span>
                  Download TTFlix v${VERSION}
                </a>

                <div class="req-row">
                  <span class="req-pill">Android 7.0+</span>
                  <span class="req-pill">~15 MB</span>
                  <span class="req-pill">Free</span>
                </div>

                <p class="install-note">
                  After downloading, open the APK.<br/>
                  If prompted, enable <strong>"Install unknown apps"</strong> in your settings.
                </p>
              </div>
            </main>

            <!-- Bottom bar -->
            <footer class="bottom-bar">
              &copy; ${VERSION} TTFlix &nbsp;·&nbsp; Trinidad &amp; Tobago Only
            </footer>

          </body>
          </html>
          HTMLEOF

      # ── 16. Deploy download page to Cloudflare Pages ───────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy download-page --project-name=ttflix --commit-dirty=true

      # ── 17. Create GitHub Release ───────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: TTFlix ${{ steps.version.outputs.TAG }}
          body: "TTFlix ${{ steps.version.outputs.TAG }}"
          files: android/app/build/outputs/apk/release/ttflix.apk
          make_latest: true
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
